services:
  - type: web
    name: abaco-demo-lavanderia
    runtime: node
    buildCommand: cd backend && npm install && npm run migrate && npm run seed && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/database
      sizeGB: 1

  # Background Worker: Scheduler Always-On
  - type: worker
    name: abaco-demo-lavanderia-scheduler
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/scheduler/run.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        fromService:
          name: abaco-demo-lavanderia
          type: web
          property: url
      - key: DEFAULT_EMPRESA_ID
        value: 1
      - key: TZ
        value: America/Guatemala
